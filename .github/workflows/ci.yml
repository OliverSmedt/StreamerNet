name: Python CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Run build script
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Run unit tests
        run: |
          python -m unittest discover -s unit_tests -p "test*.py"